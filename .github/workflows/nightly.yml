name: release nightly

on:
  pull_request:
    paths:
      - "CHANGELOG.md"

permissions:
  contents: write
  pull-requests: write

jobs:
  release-nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: delete old pre-releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          gh release list --json tagName --jq '.[].tagName' | grep '\-prerelease' | xargs -I {} gh release delete {} --yes --cleanup-tag

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          VERSION="$(cat package.json | jq -r .version)-prerelease"
          echo Version: $VERSION
          CHANGELOG="$(gh pr view $PR_NUMBER --json body --jq .body | tail -n+4)"
          echo "$CHANGELOG"
          gh release create $VERSION -p --latest=false -t "$VERSION" -n "$CHANGELOG"
